# This file builds and runs a lightweight version of the MDTF test suite.
# Note that the tests assess functionality of the diagnostics,
# and do not evaluate data or scientific content.
name: MDTF_test

on:
  push:
    branches:
      - test_v3alpha3
defaults:
  run:
    shell: bash -l {0}
jobs:
  build:
    runs-on: ${{matrix.os}}
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        conda-root: [/usr/share/miniconda3, /Users/runner/miniconda3]
        json-file: ["tests/github_actions_test.jsonc","tests/github_actions_test_macos.jsonc"]
        # allow other jobs to run if one fails
        experimental: [true]
        exclude:
          - os: ubuntu-latest
            conda-root: /Users/runner/miniconda3
          - os: ubuntu-latest
            json-file: "tests/github_actions_test_macos.jsonc"
          - os: macos-latest
            conda-root: /usr/share/miniconda3
          - os: macos-latest
            json-file: "tests/github_actions_test.jsonc"
          - conda-root: /usr/share/miniconda3
            json-file: "tests/github_actions_test_macos.jsonc"
          - conda-root: /Users/runner/minconda3
            json-file: "tests/github_actions_test.jsonc"
      max-parallel: 2
    steps:
    - uses: actions/checkout@v2
    - name: Download Miniconda 3
      uses: conda-incubator/setup-miniconda@v2
      with:
        miniconda-version: "latest"
        python-version: 3.8
    - name: Verify miniconda
      run: |
        conda info -a
    - name: Install dependencies
      run: |
        echo "Available Space"
        df -h
        # MDTF-specific setup: install all conda envs
        ./src/conda/conda_env_setup.sh --all --conda_root ${{matrix.conda-root}}
        # attempt FTP data fetch for EOF_500hPa
        # allow 20 min for transfer before timeout; Github actions allows 6 hours for individual
        # jobs, but we don't want to max out resources that are shared by the NOAA-GFDL repos.
        curl --verbose --ipv4 --connect-timeout 8 --max-time 1200 --retry 128 --ftp-ssl --disable-epsv --ftp-pasv -u "anonymous:anonymous" ftp://ftp.gfdl.noaa.gov/pub/thomas.jackson/travis_test.tar --output travis_test.tar
        echo "Untarring test files"
        tar -xvf travis_test.tar -C ${PWD}/../ #GH actions double nests the MDTF_diagnostics repo
        mkdir ../wkdir
        echo "Diretories one level up"
        ls -R ../*/*
        echo "Directories and files in the current directory:"
        ls # debug
        echo "Available Space"
        df -h # Log space remaining
    - name: Set environment variables
      run: |
        echo "POD_OUTPUT=$(echo $PWD/../wkdir/MDTF_NCAR-CAM5.timeslice_2000_2003)" >> $GITHUB_ENV
        echo "POD_OUTPUT is: "
        echo ${POD_OUTPUT}
    - name: Run diagnostic tests
      run: |
        conda activate _MDTF_base
        cat ./mdtf
        # trivial check that install script worked
        ./mdtf --version
        # try running EOF_500hPa and example PODs
        ./mdtf -v -f ${{matrix.json-file}}
        # EOF_500hPa
        ls ${POD_OUTPUT}/EOF_500hPa/obs
        ls ${POD_OUTPUT}/EOF_500hPa/model
        cat "${POD_OUTPUT}/EOF_500hPa/EOF_500hPa.log"
        # example
        ls ${POD_OUTPUT}/example/obs
        ls ${POD_OUTPUT}/example/model
        cat "${POD_OUTPUT}/example/example.log"
    - name: Run unit tests
      run: |
        python -m unittest discover

